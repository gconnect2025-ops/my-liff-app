<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G-CONNECT 会員証</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: sans-serif; background-color: #001524; color: white; margin: 0; }
        .bg-platinum { background: linear-gradient(135deg, #303030, #a5a5a5, #303030); color: #fff; }
        .bg-diamond  { background: linear-gradient(135deg, #e0e0e0, #ffffff, #e0e0e0); color: #333; }
        .bg-gold     { background: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728); color: #4a3b00; }
        .bg-silver   { background: linear-gradient(135deg, #7f8c8d, #bdc3c7); color: #1a1a1a; }
        .bg-bronze   { background: linear-gradient(135deg, #804e2d, #e68e53); color: white; }
        .bg-default  { background: linear-gradient(135deg, #99f2ff, #38d1ff); color: #001524; }
        .point-box { background: rgba(0, 0, 0, 0.1); backdrop-filter: blur(8px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">
    <div id="loading" class="fixed inset-0 bg-[#001524] flex flex-col items-center justify-center z-50">
        <div class="animate-spin h-10 w-10 border-4 border-emerald-500 rounded-full border-t-transparent mb-4"></div>
        <p>会員証を準備中...</p>
    </div>

    <div id="cardContainer" style="display:none;" class="w-full max-w-sm rounded-[40px] p-6 shadow-2xl relative overflow-hidden">
        <div class="text-center mb-5">
            <p id="rankLabel" class="text-[10px] font-black tracking-widest opacity-60 uppercase"></p>
            <p id="userCompany" class="text-[12px] font-bold mt-2 opacity-80"></p>
            <h1 id="userName" class="text-3xl font-black mt-1"></h1>
        </div>

        <div class="mb-6 text-center">
            <a href="https://gconnect2025-ops.github.io/my-liff-app/pay.html" class="block w-full bg-[#001524] text-white py-4 rounded-full text-sm font-black shadow-lg text-center text-decoration-none">
                💸 ポイントを付与する
            </a>
        </div>

        <div class="flex flex-col gap-3 mb-6">
            <div class="point-box rounded-3xl p-5 text-center">
                <p class="text-[10px] font-black opacity-60 mb-1 uppercase tracking-tighter">応援ポイント</p>
                <p id="mainPoints" class="text-4xl font-black">0<span class="text-xl ml-1 text-xs">PT</span></p>
                <p id="mainExp" class="text-[10px] mt-2 font-bold opacity-50">有効期限: --/--</p>
            </div>
        </div>

        <div class="flex justify-center mb-4">
            <div class="bg-white p-4 rounded-[30px] shadow-xl">
                <img id="qrCode" src="" class="w-32 h-32" alt="QRコード">
            </div>
        </div>
        <p id="memberNoDisplay" class="text-center text-[11px] font-bold opacity-50 mb-6">会員番号: --</p>

        <div class="mt-4 border-t border-black/10 pt-4">
            <h3 class="text-[10px] font-black mb-4 opacity-40 uppercase text-center tracking-widest">History</h3>
            <div id="historyList" class="space-y-2"></div>
        </div>
    </div>

    <script>
        // 💡 いただいた最新のGASウェブアプリURLを完璧にセットしました
        const GAS_URL_CARD = "https://script.google.com/macros/s/AKfycbyxMCasJy5foZLF_fqWukTmaeQqhGRTTE9U9Vm7dtGcBAFMkrYj2sUYwp3Y1Pnn55VqOA/exec";
        const LIFF_ID_CARD = "2007046922-d6brbL9k"; 

        async function init() {
            try {
                await liff.init({ liffId: LIFF_ID_CARD });
                if (!liff.isLoggedIn()) { liff.login(); return; }
                const profile = await liff.getProfile();
                const userId = profile.userId;
                
                const response = await fetch(`${GAS_URL_CARD}?userId=${encodeURIComponent(userId)}`);
                const result = await response.json(); 
                const user = result.user;

                if (!user || !user.isRegistered) {
                    document.getElementById('loading').innerHTML = `
                        <div class="text-center p-6 text-white">
                            <p class="text-xl font-bold mb-2">会員情報が見つかりません</p>
                            <p class="text-sm opacity-60">LINE公式アカウントで「登録」と送信し、初期登録を完了させてください。</p>
                        </div>`;
                    return;
                }

                // 表示更新
                document.getElementById('rankLabel').innerText = `RANK: ${user.rank || "レギュラー"}`;
                document.getElementById('userCompany').innerText = user.company || "G-CONNECT";
                document.getElementById('userName').innerText = `${user.realName} 様`;
                
                const currentPoints = Number(user.points) || 0;
                document.getElementById('mainPoints').innerHTML = `${currentPoints.toLocaleString()}<span class="text-xl ml-1 text-xs">PT</span>`;
                document.getElementById('mainExp').innerText = `有効期限: ${user.exp || "--/--"}`;
                document.getElementById('memberNoDisplay').innerText = `会員番号: ${user.memberNo || "未発行"}`;

                // 💡【重要修正】QRコードの表示すれ違いを完全に解消
                // GASからドライブのURL（user.qrUrl）が届いていればそれを表示し、無ければ会員番号からその場で100%安全に自動生成します
                if (user.qrUrl && user.qrUrl.includes("http")) {
                    document.getElementById('qrCode').src = user.qrUrl;
                } else {
                    const cleanMemberNo = user.memberNo || user.userId;
                    document.getElementById('qrCode').src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(cleanMemberNo)}`;
                }

                const card = document.getElementById('cardContainer');
                const classes = { "プラチナ": "bg-platinum", "ダイヤモンド": "bg-diamond", "ゴールド": "bg-gold", "シルバー": "bg-silver", "ブロンズ": "bg-bronze", "ゲスト": "bg-white text-black" };
                card.className = `w-full max-w-sm rounded-[40px] p-6 shadow-2xl relative overflow-hidden ${classes[user.rank] || 'bg-default'}`;

                const histDiv = document.getElementById('historyList');
                histDiv.innerHTML = ""; 

                if (user.historyList && user.historyList.length > 0) {
                    user.historyList.forEach(h => {
                        const isPlus = (h.type === 'plus');
                        const colorClass = isPlus ? 'text-blue-800' : 'text-red-800';
                        const actionLabel = isPlus ? '受領' : '発行'; 
                        const pointMark = isPlus ? '+' : '-';
                        const displayPoint = Number(h.point) || 0;
                        
                        histDiv.innerHTML += `
                            <div class="flex justify-between items-center text-[11px] border-b border-black/5 pb-2 text-black">
                                <span class="opacity-60">${h.date}</span>
                                <span class="font-bold flex-1 ml-4">${h.staff}（${actionLabel}）</span>
                                <span class="font-black ${colorClass}">${pointMark}${displayPoint.toLocaleString()} PT</span>
                            </div>`;
                    });
                } else {
                    histDiv.innerHTML = '<p class="text-center opacity-40 text-[10px] text-black">履歴はありません</p>';
                }

                document.getElementById('loading').style.style.display = 'none';
                card.style.display = 'block';
            } catch (e) {
                console.error(e);
                alert("データの取得に失敗しました。");
            }
        }
        window.onload = init;
    </script>
</body>
</html>
