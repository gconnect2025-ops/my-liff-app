<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G-CONNECT 会員証</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white font-sans min-h-screen p-4 flex flex-col items-center">

    <div id="card" class="w-full max-w-sm bg-gradient-to-br from-emerald-500 to-teal-700 rounded-3xl shadow-2xl overflow-hidden hidden mb-6">
        <div class="p-6">
            <div class="flex justify-between items-start mb-6">
                <div>
                    <p id="user-company" class="text-[10px] font-bold text-emerald-100 tracking-widest uppercase mb-1">---</p>
                    <h1 id="user-name" class="text-2xl font-bold tracking-tight">読み込み中...</h1>
                </div>
                <div class="bg-white/20 px-3 py-1 rounded-full backdrop-blur-md">
                    <p id="user-rank" class="text-xs font-bold text-white">---</p>
                </div>
            </div>

            <div class="space-y-3 mb-6">
                <div class="bg-white/10 p-4 rounded-2xl flex justify-between items-center">
                    <span class="text-sm font-medium text-emerald-50 text-opacity-80">応援ポイント</span>
                    <span id="support-point" class="text-2xl font-black text-white">0 pt</span>
                </div>
            </div>

            <div class="flex flex-col items-center py-4 bg-white rounded-2xl mb-2">
                <p class="text-[10px] text-gray-400 font-bold mb-2">SCAN FOR CHECK-IN</p>
                <img id="user-qr" src="" alt="QR" class="h-24 w-auto">
                <p id="user-number" class="text-gray-900 font-mono text-sm mt-2 font-bold">No. ---</p>
            </div>
        </div>
    </div>

    <div id="history-section" class="w-full max-w-sm hidden">
        <h2 class="text-emerald-500 text-sm font-bold mb-3 flex items-center">🕒 直近の履歴</h2>
        <div id="history-list" class="space-y-2"></div>
    </div>

    <div id="loading" class="mt-20 text-center">
        <div id="spinner" class="animate-spin h-10 w-10 border-4 border-emerald-500 border-t-transparent rounded-full mx-auto mb-4"></div>
        <p id="status-text" class="text-emerald-500 font-bold">認証中...</p>
    </div>

    <script>
        // 設定値
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxhKOKGzQRvEr0eA5WgudSSsGMPGmL2e0jmO8vUPyzbHShCxNv1JBR_nGee1C-OnDIF7Q/exec";
        const MY_LIFF_ID = "2007046922-d6brbL9k";

        async function main() {
            try {
                // LIFF初期化
                await liff.init({ liffId: MY_LIFF_ID });

                if (!liff.isLoggedIn()) {
                    liff.login();
                    return;
                }

                const profile = await liff.getProfile();
                
                // GASへデータ取得リクエスト
                const response = await fetch(`${GAS_URL}?action=get&userId=${profile.userId}`);
                if (!response.ok) throw new Error("ネットワークエラーが発生しました");
                
                const data = await response.json();

                if (data.status === "success") {
                    // 表示反映
                    document.getElementById('loading').classList.add('hidden');
                    document.getElementById('card').classList.remove('hidden');
                    document.getElementById('history-section').classList.remove('hidden');

                    document.getElementById('user-company').innerText = data.company || "G-CONNECT";
                    document.getElementById('user-name').innerText = data.name + " 様";
                    document.getElementById('user-rank').innerText = data.rank || "REGULAR";
                    document.getElementById('support-point').innerText = (data.supportPoint || 0).toLocaleString() + " pt";
                    document.getElementById('user-number').innerText = "No. " + (data.number || "---");
                    document.getElementById('user-qr').src = data.qr || "";

                    renderHistory(data.history);
                } else {
                    // ユーザーが見つからない場合
                    showError(`データが見つかりません。<br><span class="text-[10px]">ID: ${profile.userId}</span>`);
                }

            } catch (error) {
                console.error(error);
                showError("接続に失敗しました。<br>通信環境を確認してください。");
            }
        }

        function showError(msg) {
            document.getElementById('spinner').classList.add('hidden');
            const statusText = document.getElementById('status-text');
            statusText.classList.remove('text-emerald-500');
            statusText.classList.add('text-rose-500');
            statusText.innerHTML = msg;
        }

        function renderHistory(history) {
            const list = document.getElementById('history-list');
            if (!history || history.length === 0) {
                list.innerHTML = '<p class="text-gray-500 text-xs text-center py-4">履歴はありません</p>';
                return;
            }
            list.innerHTML = history.map(h => `
                <div class="bg-slate-800 p-3 rounded-xl flex justify-between items-center border border-slate-700">
                    <div>
                        <p class="text-[10px] text-gray-400 font-bold">${h.date}</p>
                        <p class="text-xs text-emerald-100">${h.staff} から受取</p>
                    </div>
                    <div class="text-right">
                        <p class="text-sm font-black text-emerald-400">+${h.earned.toLocaleString()} pt</p>
                    </div>
                </div>
            `).join('');
        }

        main();
    </script>
</body>
</html>
