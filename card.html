<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G-CONNECT 会員証</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: sans-serif; background-color: #001524; color: white; }
        .bg-platinum { background: linear-gradient(135deg, #303030, #a5a5a5, #303030); color: #fff; }
        .bg-diamond  { background: linear-gradient(135deg, #e0e0e0, #ffffff, #e0e0e0); color: #333; }
        .bg-gold     { background: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728); color: #4a3b00; }
        .bg-silver   { background: linear-gradient(135deg, #7f8c8d, #bdc3c7); color: #1a1a1a; }
        .bg-bronze   { background: linear-gradient(135deg, #804e2d, #e68e53); color: white; }
        .bg-default  { background: linear-gradient(135deg, #99f2ff, #38d1ff); color: #001524; }
        .point-box { background: rgba(0, 0, 0, 0.1); backdrop-filter: blur(8px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">
    <div id="loading" class="fixed inset-0 bg-[#001524] flex flex-col items-center justify-center z-50">
        <div class="animate-spin h-10 w-10 border-4 border-emerald-500 rounded-full border-t-transparent mb-4"></div>
        <p>会員証を読み込み中...</p>
    </div>

    <div id="cardContainer" style="display:none;" class="w-full max-w-sm rounded-[40px] p-6 shadow-2xl relative overflow-hidden">
        <div class="text-center mb-5">
            <p id="rankLabel" class="text-[10px] font-black tracking-widest opacity-60 uppercase"></p>
            <p id="userCompany" class="text-[12px] font-bold mt-2 opacity-80"></p>
            <h1 id="userName" class="text-3xl font-black mt-1"></h1>
        </div>
        <div class="mb-6"><a href="https://liff.line.me/2007046922-EHW4nk35" class="block w-full bg-[#001524] text-white text-center py-4 rounded-full text-sm font-black">💸 ポイントを送金する</a></div>
        <div class="flex flex-col gap-3 mb-6">
            <div class="point-box rounded-3xl p-5 text-center">
                <p class="text-[10px] font-black opacity-60 mb-1 uppercase">応援ポイント</p>
                <p id="mainPoints" class="text-4xl font-black">0<span class="text-xl ml-1 text-xs">G</span></p>
                <p id="mainExp" class="text-[10px] mt-2 font-bold opacity-50">有効期限: --/--</p>
            </div>
            <div class="point-box rounded-3xl p-4 text-center opacity-90">
                <p class="text-[9px] font-black opacity-60 mb-1 uppercase">イベントポイント</p>
                <p id="eventPoints" class="text-2xl font-black">0<span class="text-sm ml-1 text-xs">G</span></p>
                <p id="eventExp" class="text-[9px] mt-1 font-bold opacity-50">有効期限: --/--</p>
            </div>
        </div>
        <div class="flex justify-center mb-8"><div class="bg-white p-4 rounded-[30px] shadow-xl"><img id="qrCode" src="" class="w-32 h-32"></div></div>
        <div class="mt-4 border-t border-black/10 pt-4"><h3 class="text-[10px] font-black mb-4 opacity-40 uppercase text-center tracking-widest">History</h3><div id="historyList" class="space-y-2"></div></div>
    </div>

    <script>
        const GAS_URL_CARD = "https://script.google.com/macros/s/AKfycbxynJn3a7vOSvAo07Ctuz7SBEmYc3oJulCFslF9TeUiY8OFAB0KxAbkqD4J5ixO_IKw0Q/exec";
        const LIFF_ID_CARD = "2007046922-d6brbL9k";

        async function init() {
            try {
                await liff.init({ liffId: LIFF_ID_CARD });
                if (!liff.isLoggedIn()) { liff.login(); return; }
                const profile = await liff.getProfile();
                const response = await fetch(`${GAS_URL_CARD}?userId=${profile.userId}`);
                const user = await response.json();

                // UI更新
                document.getElementById('rankLabel').innerText = `RANK: ${user.rank}`;
                document.getElementById('userCompany').innerText = user.company;
                document.getElementById('userName').innerText = `${user.realName} 様`;
                document.getElementById('mainPoints').innerHTML = `${user.points}<span class="text-xl ml-1 text-xs">G</span>`;
                document.getElementById('mainExp').innerText = `有効期限: ${user.exp}`;
                document.getElementById('eventPoints').innerHTML = `${user.eventPoints}<span class="text-sm ml-1 text-xs">G</span>`;
                document.getElementById('eventExp').innerText = `有効期限: ${user.eventExp}`;
                document.getElementById('qrCode').src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${user.userId}`;

                // ランククラス
                const card = document.getElementById('cardContainer');
                const classes = { "プラチナ": "bg-platinum", "ダイヤモンド": "bg-diamond", "ゴールド": "bg-gold", "シルバー": "bg-silver", "ブロンズ": "bg-bronze", "ゲスト": "bg-white text-black" };
                card.className = `w-full max-w-sm rounded-[40px] p-6 shadow-2xl relative overflow-hidden ${classes[user.rank] || 'bg-default'}`;

                // 履歴
                const histDiv = document.getElementById('historyList');
                user.historyList.forEach(h => {
                    histDiv.innerHTML += `<div class="flex justify-between items-center text-[11px] border-b border-black/5 pb-2 text-black"><span class="opacity-60">${h.date}</span><span class="font-bold flex-1 ml-4">${h.staff}</span><span class="font-black ${h.type==='plus'?'text-blue-800':'text-red-800'}">${h.type==='plus'?'+':'-'}${h.point}G</span></div>`;
                });

                document.getElementById('loading').style.display = 'none';
                card.style.display = 'block';
            } catch (e) { alert("会員証の読み込みに失敗しました。"); }
        }
        window.onload = init;
    </script>
</body>
</html>
