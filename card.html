<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G-CONNECT 会員証</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: sans-serif; background-color: #001524; color: white; margin: 0; }
        .bg-platinum { background: linear-gradient(135deg, #303030, #a5a5a5, #303030); color: #fff; }
        .bg-diamond  { background: linear-gradient(135deg, #e0e0e0, #ffffff, #e0e0e0); color: #333; }
        .bg-gold     { background: linear-gradient(135deg, #bf953f, #fcf6ba 25%, #b38728); color: #4a3b00; }
        .bg-silver   { background: linear-gradient(135deg, #7f8c8d, #bdc3c7); color: #1a1a1a; }
        .bg-bronze   { background: linear-gradient(135deg, #804e2d, #e68e53); color: white; }
        .bg-regular  { background: linear-gradient(135deg, #00223e, #00335c); color: #ffffff; }
        .bg-guest    { background: #ffffff !important; color: #001524 !important; }
        .point-box { background: rgba(0, 0, 0, 0.06); border: 1px solid rgba(0, 0, 0, 0.08); }
        .bg-dark-mode .point-box { background: rgba(0, 0, 0, 0.2); border: 1px solid rgba(255, 255, 255, 0.1); }
        .history-box { background: rgba(0, 0, 0, 0.03); border: 1px solid rgba(0, 0, 0, 0.05); }
        .bg-dark-mode .history-box { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.05); }
        .text-gold {
            background: linear-gradient(135deg, #b38728 0%, #fcf6ba 25%, #bf953f 50%, #fcf6ba 75%, #aa771c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="min-h-screen bg-[#001524]">

    <div id="loading" class="fixed inset-0 bg-[#001524] flex flex-col items-center justify-center z-50">
        <div class="animate-spin h-10 w-10 border-4 border-[#bf953f] rounded-full border-t-transparent mb-4"></div>
        <p class="text-white font-bold">会員証を準備中...</p>
    </div>

    <div id="cardContainer" style="display:none;" class="w-full min-h-screen p-6 relative overflow-hidden bg-regular">
        
        <div class="text-center mb-6 pt-4">
            <p id="rankLabel" class="text-xs font-black tracking-widest opacity-80 uppercase text-gold"></p>
            <p id="userCompany" class="text-sm font-bold mt-2 opacity-90"></p>
            <h1 id="userName" class="text-3xl font-black mt-1">取得中...</h1>
        </div>

        <div class="mb-6 text-center">
            <a href="https://liff.line.me/2007046922-EHW4nk35" class="block w-full bg-gradient-to-r from-[#bf953f] via-[#fcf6ba] to-[#b38728] text-white py-4 rounded-full text-base font-black shadow-lg text-center text-decoration-none tracking-widest">
                💸 ポイントを付与する
            </a>
        </div>

        <div class="flex flex-col gap-3 mb-6">
            <div id="pointBox" class="point-box rounded-3xl p-5 text-center">
                <p class="text-xs font-black text-gold mb-1 uppercase tracking-wider">応援ポイント残高</p>
                <p id="mainPoints" class="text-4xl font-black">0<span class="text-xl ml-1">PT</span></p>
                <p id="mainExp" class="text-xs mt-2 font-bold opacity-60">有効期限: --/--</p>
            </div>
        </div>

        <div class="flex justify-center mb-8">
            <div class="bg-white p-4 rounded-[25px] shadow-2xl border border-slate-100">
                <img id="qrCode" src="" class="w-36 h-36" alt="会員QRコード">
            </div>
        </div>

        <div id="memberNoDisplay" style="display:none;"></div>

        <div id="historySection" class="mt-6 border-t border-black/10 pt-4">
            <h3 class="text-xs font-black mb-4 text-gold uppercase text-center tracking-widest">History (直近10件)</h3>
            <div id="historyList" class="space-y-2 history-box rounded-2xl p-4"></div>
        </div>
    </div>

    <script>
        const GAS_URL_CARD = "https://script.google.com/macros/s/AKfycbzP8_WdVfsMHLRFq0fxgAtm0EwZQWnuSV_ThGxfeWcqKlNtEYp6I_EiHDKXjJUqJqPJVw/exec";
        const LIFF_ID_CARD = "2007046922-d6brbL9k"; 

        async function init() {
            try {
                await liff.init({ liffId: LIFF_ID_CARD });
                if (!liff.isLoggedIn()) { liff.login(); return; }
                const profile = await liff.getProfile();
                const userId = profile.userId;
                
                const response = await fetch(`${GAS_URL_CARD}?userId=${encodeURIComponent(userId)}`);
                const result = await response.json(); 
                const user = result.user;

                if (!user || !user.isRegistered) {
                    // 💡【重要修正】チャット経由の登録を完全にやめ、GASが直接持っているアンケートHTML（?page=register）を画面いっぱいに直接開かせます！
                    const regUrl = `${GAS_URL_CARD}?page=register&userId=${encodeURIComponent(userId)}`;
                    
                    document.getElementById('loading').innerHTML = `
                        <div class="text-center p-6 text-white flex flex-col items-center justify-center min-h-screen">
                            <p class="text-xl font-black mb-4 text-gold tracking-wider">G-CONNECT 会員登録</p>
                            <p class="text-sm opacity-90 mb-6 leading-relaxed">
                                ご入会ありがとうございます！<br>
                                まだ会員情報の初期登録が完了していません。
                            </p>
                            <a href="${regUrl}" class="w-full max-w-xs bg-gradient-to-r from-[#bf953f] via-[#fcf6ba] to-[#b38728] text-[#4a3b00] py-4 rounded-full text-base font-black shadow-lg text-center tracking-widest block text-decoration-none">
                                📝 初期登録を開始する
                            </a>
                        </div>`;
                    return;
                }

                const currentRank = (user.rank || "レギュラー").trim();
                document.getElementById('rankLabel').innerText = `RANK: ${currentRank}`;
                document.getElementById('userCompany').innerText = user.company || "G-CONNECT";
                document.getElementById('userName').innerText = `${user.realName} 様`;
                
                const currentPoints = Number(user.points) || 0;
                document.getElementById('mainPoints').innerHTML = `${currentPoints.toLocaleString()}<span class="text-sm font-bold ml-1">PT</span>`;
                
                let expDisplay = `有効期限: ${user.exp || "--/--"}`;
                if (user.exp && user.exp !== "--/--") {
                    const now = new Date();
                    now.setHours(0,0,0,0);
                    
                    const currentYear = now.getFullYear();
                    const [expMonth, expDay] = user.exp.split("/").map(Number);
                    const expDate = new Date(currentYear, expMonth - 1, expDay);
                    
                    if (expDate < now && (now.getMonth() === 11 || now.getMonth() === 0)) {
                        expDate.setFullYear(currentYear + 1);
                    }
                    
                    const diffTime = expDate.getTime() - now.getTime();
                    const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                    
                    if (currentPoints <= 0) {
                        expDisplay += " (残高なし)";
                    } else if (diffDays > 0) {
                        expDisplay += ` (あと ${diffDays} 日)`;
                    } else if (diffDays === 0) {
                        expDisplay += " (⚠️ 本日まで！)";
                    } else {
                        expDisplay += " (失効)";
                    }
                }
                document.getElementById('mainExp').innerText = expDisplay;
                
                document.getElementById('memberNoDisplay').innerText = user.memberNo || "";

                if (user.qrUrl && user.qrUrl.includes("http")) {
                    document.getElementById('qrCode').src = user.qrUrl;
                } else {
                    const cleanMemberNo = user.memberNo || user.userId;
                    document.getElementById('qrCode').src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(cleanMemberNo)}`;
                }

                const card = document.getElementById('cardContainer');
                const historySec = document.getElementById('historySection');
                
                const classes = { 
                    "ダイヤモンド": "bg-diamond", 
                    "プラチナ": "bg-platinum", 
                    "ゴールド": "bg-gold", 
                    "シルバー": "bg-silver", 
                    "ブロンズ": "bg-bronze",
                    "レギュラー": "bg-regular",
                    "ゲスト": "bg-guest" 
                };
                
                if(currentRank === "ゲスト") {
                    card.className = "w-full min-h-screen p-6 relative overflow-hidden bg-guest";
                    historySec.className = "mt-6 border-t border-black/10 pt-4";
                    card.classList.remove("bg-dark-mode");
                } else if(classes[currentRank]) {
                    card.className = `w-full min-h-screen p-6 relative overflow-hidden bg-dark-mode ${classes[currentRank]}`;
                    historySec.className = "mt-6 border-t border-white/10 pt-4";
                } else {
                    card.className = "w-full min-h-screen p-6 relative overflow-hidden bg-dark-mode bg-regular";
                    historySec.className = "mt-6 border-t border-white/10 pt-4";
                }

                const histDiv = document.getElementById('historyList');
                histDiv.innerHTML = ""; 

                const borderClass = (currentRank === "ゲスト") ? "border-black/5" : "border-white/10";
                const textOpacity = (currentRank === "ゲスト") ? "text-slate-500" : "opacity-60";

                if (user.historyList && user.historyList.length > 0) {
                    user.historyList.forEach(h => {
                        const isPlus = (h.type === 'plus');
                        const colorClass = isPlus ? 'text-emerald-500 font-bold' : 'text-rose-500 font-bold';
                        const actionLabel = isPlus ? '受領' : '発行'; 
                        const pointMark = isPlus ? '+' : '-';
                        const displayPoint = Number(h.point) || 0;
                        
                        histDiv.innerHTML += `
                            <div class="flex justify-between items-center text-xs border-b ${borderClass} pb-2 pt-1">
                                <span class="${textOpacity}">${h.date}</span>
                                <span class="font-bold flex-1 ml-4">${h.staff}（${actionLabel}）</span>
                                <span class="font-black ${colorClass}">${pointMark}${displayPoint.toLocaleString()} PT</span>
                            </div>`;
                    });
                } else {
                    histDiv.innerHTML = `<p class="text-center ${textOpacity} text-xs py-2">お取引履歴はありません</p>`;
                }

                document.getElementById('loading').style.display = 'none';
                card.style.display = 'block';

            } catch (e) {
                console.error(e);
                alert("会員データの取得に失敗しました。時間をおいて再度お試しください。");
            }
        }
        window.onload = init;
    </script>
</body>
</html>
