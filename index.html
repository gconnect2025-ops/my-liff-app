<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G-CONNECT ポイント付与</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .text-gold {
            background: linear-gradient(135deg, #b38728 0%, #fcf6ba 25%, #bf953f 50%, #fcf6ba 75%, #aa771c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .bg-gold-gradient {
            background: linear-gradient(135deg, #bf953f 0%, #fcf6ba 50%, #b38728 100%);
        }
    </style>
</head>
<body class="bg-white text-[#001524] min-h-screen p-4 flex flex-col items-center font-sans relative">

    <div id="loading" class="fixed inset-0 bg-white flex flex-col items-center justify-center z-50">
        <div class="animate-spin h-10 w-10 border-4 border-[#bf953f] rounded-full border-t-transparent mb-4"></div>
        <p class="text-[#001524] font-bold">決済システムを起動中...</p>
    </div>

    <div id="successModal" style="display:none;" class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
        <div class="bg-white w-full max-w-sm rounded-[30px] p-6 text-center shadow-2xl border border-slate-100">
            <div class="w-16 h-16 bg-emerald-50 rounded-full flex items-center justify-center mx-auto mb-4 border border-emerald-200">
                <span class="text-3xl text-emerald-500">🎉</span>
            </div>
            <h3 class="text-lg font-black text-[#001524] mb-4">ポイント取引が正常に完了しました！</h3>
            
            <div class="bg-slate-50 rounded-2xl p-4 text-left text-sm space-y-2 mb-6 border border-slate-100">
                <p class="font-bold text-slate-500">【お取引内容】</p>
                <p class="text-[#001524] font-bold">お相手：<span id="resCustomer" class="font-black">--</span> 様</p>
                <div class="flex justify-between border-t border-slate-200/60 pt-2">
                    <span class="text-amber-800 font-bold">新規付与：</span>
                    <span id="resEarn" class="font-black text-[#b38728]">+0 PT</span>
                </div>
                <div class="flex justify-between">
                    <span class="text-blue-700 font-bold">今回利用：</span>
                    <span id="resUse" class="font-black text-blue-600">-0 PT</span>
                </div>
            </div>

            <button onclick="closeLiffWindow()" class="w-full bg-gold-gradient text-white py-3.5 rounded-full font-black shadow-md tracking-widest text-sm">
                確認して閉じる
            </button>
        </div>
    </div>

    <div id="mainContent" style="display:none;" class="w-full max-w-sm bg-white">
        <h2 class="text-2xl font-black text-center mb-6 text-gold flex items-center justify-center gap-2 uppercase tracking-wider">
            💸 ポイント付与・送金
        </h2>
        
        <div class="mb-5 bg-slate-50 p-3 rounded-2xl border border-slate-100 flex justify-between items-center">
            <div>
                <p class="text-[11px] font-bold text-slate-400 uppercase tracking-tight">操作者（あなた）</p>
                <p id="myStaffName" class="text-base font-black text-[#001524]">取得中...</p>
            </div>
            <div class="text-right">
                <p class="text-[10px] font-bold text-slate-400">あなたの原資残高</p>
                <p id="myStaffPoints" class="text-sm font-black text-amber-700">0 PT</p>
            </div>
        </div>

        <div class="mb-5">
            <button type="button" onclick="scanMemberQr()" class="w-full bg-slate-900 text-white py-3 rounded-2xl font-bold text-sm shadow-sm flex items-center justify-center gap-2 border border-slate-800 active:scale-[0.99] transition-all">
                📷 お相手のQRコードをスキャンする
            </button>
        </div>

        <div class="mb-5 bg-slate-50/50 p-4 rounded-2xl border border-slate-100 space-y-3">
            <p class="text-xs font-black text-[#bf953f] uppercase tracking-wider">🔍 またはお相手を検索・絞り込み</p>
            <div>
                <select id="searchCategory" onchange="filterMembers()" class="w-full bg-white border border-slate-200 rounded-xl p-2.5 text-[#001524] text-xs font-bold focus:outline-none focus:border-[#bf953f] shadow-sm">
                    <option value="">-- すべてのカテゴリー --</option>
                    <option value="飲食・フード">飲食・フード</option>
                    <option value="建設・不動産">建設・不動産</option>
                    <option value="IT・クリエイティブ">IT・クリエイティブ</option>
                    <option value="美容・ヘルスケア">美容・ヘルスケア</option>
                    <option value="士業・コンサル">士業・コンサル</option>
                    <option value="総合・その他">総合・その他</option>
                </select>
            </div>
            <div>
                <input type="text" id="searchName" oninput="filterMembers()" placeholder="お名前・会社名で検索..." class="w-full bg-white border border-slate-200 rounded-xl p-2.5 text-[#001524] text-xs font-bold focus:outline-none focus:border-[#bf953f] shadow-sm">
            </div>
        </div>

        <form id="txForm" onsubmit="submitTx(event)" class="space-y-4">
            <div>
                <label class="block text-xs font-black text-slate-500 mb-2 uppercase tracking-wider">1. 付与するお相手（お客様）</label>
                <select id="customerSelect" required onchange="calculatePoints()" class="w-full bg-white border-2 border-slate-100 rounded-xl p-3 text-[#001524] font-bold focus:outline-none focus:border-[#bf953f] text-sm shadow-sm">
                    <option value="">-- お相手を選択してください --</option>
                </select>
                <p id="memberCount" class="text-[10px] text-right text-slate-400 mt-1 font-bold">対象: 0名</p>
            </div>

            <div>
                <label class="block text-xs font-black text-slate-500 mb-2 uppercase tracking-wider">2. ご利用金額（税込）</label>
                <div class="relative">
                    <input type="number" id="totalSales" required min="1" placeholder="例: 10000" oninput="calculatePoints()" class="w-full bg-white border-2 border-slate-100 rounded-xl p-3 text-[#001524] focus:outline-none focus:border-[#bf953f] text-lg font-black shadow-sm">
                    <span class="absolute right-4 top-3.5 font-black text-slate-300">円</span>
                </div>
            </div>

            <div>
                <label class="block text-xs font-black text-slate-500 mb-2 uppercase tracking-wider">3. 今回使用するポイント</label>
                <div class="relative">
                    <input type="number" id="usedPoints" min="0" value="0" oninput="calculatePoints()" class="w-full bg-white border-2 border-slate-100 rounded-xl p-3 text-[#001524] focus:outline-none focus:border-[#bf953f] text-lg font-black shadow-sm">
                    <span class="absolute right-4 top-3.5 font-black text-slate-300">PT</span>
                </div>
                <div class="flex justify-between items-center mt-1 px-1">
                    <p id="pointLimitDisplay" class="text-[11px] font-black text-amber-700">設定中の上限: 0 PT</p>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3 pt-2">
                <div class="bg-amber-50/40 border border-amber-200/60 p-3 rounded-xl text-center shadow-sm">
                    <p class="text-[10px] text-amber-800 font-black mb-1">ポイント値引き</p>
                    <p id="calcUse" class="text-xl font-black text-[#b38728]">0 <span class="text-xs">PT</span></p>
                </div>
                <div class="bg-amber-50/40 border border-amber-200/60 p-3 rounded-xl text-center shadow-sm">
                    <p class="text-[10px] text-amber-800 font-black mb-1">差引後 新規付与</p>
                    <p id="calcEarn" class="text-xl font-black text-[#b38728]">0 <span class="text-xs">PT</span></p>
                </div>
            </div>

            <div class="pt-4">
                <button type="submit" id="submitBtn" class="w-full bg-gold-gradient text-white py-4 rounded-full text-sm font-black shadow-md hover:opacity-90 active:scale-[0.98] transition-all tracking-widest">
                    🚀 ポイント取引を確定する
                </button>
            </div>
        </form>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzP8_WdVfsMHLRFq0fxgAtm0EwZQWnuSV_ThGxfeWcqKlNtEYp6I_EiHDKXjJUqJqPJVw/exec";
        const LIFF_ID = "2007046922-EHW4nk35"; 

        let myProfile = null;
        let staffUser = null;
        let allMembers = []; 
        let maxLimitPoints = 0; 
        let myWalletPoints = 0; 

        async function init() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) { liff.login(); return; }
                myProfile = await liff.getProfile();
                
                const response = await fetch(`${GAS_URL}?userId=${encodeURIComponent(myProfile.userId)}`);
                const data = await response.json();
                
                staffUser = data.user;
                document.getElementById('myStaffName').innerText = `${staffUser.realName} 様 (${staffUser.company || '加盟店'})`;

                myWalletPoints = Number(staffUser.points) || 0;
                document.getElementById('myStaffPoints').innerText = `${myWalletPoints.toLocaleString()} PT`;

                maxLimitPoints = Number(staffUser.limitPoints) || 0;
                document.getElementById('pointLimitDisplay').innerText = `設定中の上限: ${maxLimitPoints.toLocaleString()} PT`;

                if (data.members && data.members.length > 0) {
                    allMembers = data.members.filter(m => m.userId !== myProfile.userId && m.名前 !== "ゲスト");
                    renderMemberList(allMembers);
                }

                document.getElementById('loading').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
            } catch(e) {
                console.error(e);
                alert("システムの初期化に失敗しました。");
            }
        }

        function renderMemberList(list) {
            const select = document.getElementById('customerSelect');
            select.innerHTML = '<option value="">-- お相手を選択してください --</option>';
            
            list.forEach(m => {
                const opt = document.createElement('option');
                opt.value = m.名前;
                // 後方一致や完全判定をスムーズにするため、会員番号をデータ属性(data-no)に隠し持たせます
                opt.setAttribute('data-no', m.会員番号 || '');
                opt.innerText = `${m.名前} 様 [${m.会社名}] (${m.会員番号 || '番号未発行'})`;
                select.appendChild(opt);
            });

            document.getElementById('memberCount').innerText = `対象: ${list.length}名`;
        }

        // 💡【新機能】QRコードを読み取って自動選択する処理
        async function scanMemberQr() {
            // LINEの仕様上、アプリ内ブラウザ（スマホ）でのみ動作します
            if (!liff.isInClient()) {
                alert("QRスキャン機能はスマートフォンのLINEアプリ内でのみご利用いただけます。");
                return;
            }
            
            try {
                // LINE公式のカメラを起動させてQRコードのテキストデータを取得
                const result = await liff.scanCodeV2();
                const scannedText = result.value ? result.value.trim() : "";
                
                if (!scannedText) return; // キャンセルされたら何もしない

                const select = document.getElementById('customerSelect');
                let found = false;

                // プルダウンの選択肢（メンバー）を上から順番にチェック
                for (let i = 0; i < select.options.length; i++) {
                    const opt = select.options[i];
                    const memberNo = opt.getAttribute('data-no') || "";

                    // QRコードに書き込まれている「会員番号（例: GC00002）」と一致するか判定
                    if (memberNo !== "" && memberNo === scannedText) {
                        select.selectedIndex = i;
                        found = true;
                        break;
                    }
                }

                if (found) {
                    // 自動選択されたので、ポイントの再計算を走らせる
                    calculatePoints();
                } else {
                    alert(`読み取った会員番号 [${scannedText}] に一致するメンバーが登録されていません。最新のデータを反映するか、手動で検索してください。`);
                }

            } catch (err) {
                console.error(err);
                alert("QRコードの読み取りに失敗したか、カメラの権限が拒否されました。");
            }
        }

        function filterMembers() {
            const catKeyword = document.getElementById('searchCategory').value;
            const nameKeyword = document.getElementById('searchName').value.toLowerCase().trim();

            const filtered = allMembers.filter(m => {
                let matchCat = true;
                if (nameKeyword === "") {
                    if (catKeyword !== "") {
                        const cleanKeyword = catKeyword.substring(0, 2); 
                        matchCat = m.カテゴリー.includes(cleanKeyword);
                    }
                }
                                 
                const matchName = nameKeyword === "" || 
                                  m.名前.toLowerCase().includes(nameKeyword) || 
                                  m.会社名.toLowerCase().includes(nameKeyword);
                return matchCat && matchName;
            });

            renderMemberList(filtered);
        }

        function calculatePoints() {
            const amt = Number(document.getElementById('totalSales').value) || 0;
            let used = Number(document.getElementById('usedPoints').value) || 0;
            
            document.getElementById('pointLimitDisplay').innerText = `設定中の上限: ${maxLimitPoints.toLocaleString()} PT`;

            if (used > maxLimitPoints) {
                alert(`利用可能上限（${maxLimitPoints} PT）を超えています。自動的に上限値に修正します。`);
                used = maxLimitPoints;
                document.getElementById('usedPoints').value = used;
            }

            let baseAmt = amt - used;
            if (baseAmt < 0) baseAmt = 0; 

            let earn = Math.floor(baseAmt * 0.03);
            if (earn > 5000) earn = 5000; 
            
            if (earn > myWalletPoints) {
                earn = myWalletPoints; 
            }
            
            document.getElementById('calcUse').innerText = `${used.toLocaleString()} PT`;
            document.getElementById('calcEarn').innerText = `${earn.toLocaleString()} PT`;
        }

        async function submitTx(e) {
            e.preventDefault();
            
            const customerName = document.getElementById('customerSelect').value;
            const totalSales = Number(document.getElementById('totalSales').value) || 0;
            const usedPoints = Number(document.getElementById('usedPoints').value) || 0;
            
            if (!customerName) { alert("お相手を選択してください。"); return; }
            if (totalSales < usedPoints) { alert("利用ポイントがご利用金額を超えています。"); return; }
            if (usedPoints > maxLimitPoints) { alert("利用可能上限を超えています。"); return; }
            
            let baseAmt = totalSales - usedPoints;
            if (baseAmt < 0) baseAmt = 0;
            
            let earnedPoints = Math.floor(baseAmt * 0.03);
            if (earnedPoints > 5000) earnedPoints = 5000;
            
            if (earnedPoints > myWalletPoints) {
                earnedPoints = myWalletPoints;
            }

            if (earnedPoints === 0 && baseAmt > 0 && myWalletPoints === 0) {
                alert("あなた（操作者）の保有ポイントが0PTのため、新しいポイントを発行できません。");
                return;
            }
            
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = "処理中... 画面を閉じないでください";

            try {
                const payload = {
                    totalSales: totalSales,
                    usedPoints: usedPoints,
                    earnedPoints: earnedPoints,
                    staffId: myProfile.userId,
                    staffName: staffUser.realName,
                    customerName: customerName
                };

                await fetch(GAS_URL, {
                    method: "POST",
                    body: JSON.stringify(payload)
                });
                
                document.getElementById('resCustomer').innerText = customerName;
                document.getElementById('resEarn').innerText = `+${earnedPoints.toLocaleString()} PT`;
                document.getElementById('resUse').innerText = `-${usedPoints.toLocaleString()} PT`;
                
                document.getElementById('successModal').style.display = 'flex';
            } catch(err) {
                console.error(err);
                alert("通信エラーが発生しました。");
                btn.disabled = false;
                btn.innerText = "🚀 ポイント取引を確定する";
            }
        }

        function closeLiffWindow() {
            liff.closeWindow();
        }

        window.onload = init;
    </script>
</body>
</html>
