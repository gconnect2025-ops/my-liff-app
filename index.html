<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G-CONNECT ポイント付与</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#001524] text-white min-h-screen p-4 flex flex-col items-center">

    <div id="loading" class="fixed inset-0 bg-[#001524] flex flex-col items-center justify-center z-50">
        <div class="animate-spin h-10 w-10 border-4 border-emerald-500 rounded-full border-t-transparent mb-4"></div>
        <p>決済システムを起動中...</p>
    </div>

    <div id="mainContent" style="display:none;" class="w-full max-w-sm bg-slate-900/50 backdrop-blur-md rounded-[30px] p-6 border border-white/10 shadow-2xl">
        <h2 class="text-xl font-black text-center mb-6 text-emerald-400">💸 ポイント付与・送金</h2>
        
        <div class="mb-4 bg-white/5 p-3 rounded-2xl border border-white/5">
            <p class="text-xs opacity-60">操作者（あなた）</p>
            <p id="myStaffName" class="text-lg font-bold text-white">取得中...</p>
        </div>

        <form id="txForm" onsubmit="submitTx(event)" class="space-y-4">
            <div>
                <label class="block text-xs font-bold opacity-60 mb-2 uppercase tracking-wider">1. 付与するお相手（お客様）</label>
                <select id="customerSelect" required class="w-full bg-slate-800 border border-white/20 rounded-xl p-3 text-white focus:outline-none focus:border-emerald-500 text-sm">
                    <option value="">-- お相手を選択してください --</option>
                </select>
            </div>

            <div>
                <label class="block text-xs font-bold opacity-60 mb-2 uppercase tracking-wider">2. ご利用金額（税込）</label>
                <div class="relative">
                    <input type="number" id="totalSales" required min="1" placeholder="例: 10000" oninput="calculatePoints()" class="w-full bg-slate-800 border border-white/20 rounded-xl p-3 text-white focus:outline-none focus:border-emerald-500 text-lg font-bold">
                    <span class="absolute right-4 top-3.5 font-bold opacity-60">円</span>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3 pt-2">
                <div class="bg-blue-950/40 border border-blue-500/20 p-3 rounded-xl text-center">
                    <p class="text-[10px] opacity-60 font-bold mb-1">利用可能ポイント</p>
                    <p id="calcUse" class="text-xl font-black text-blue-400">0 <span class="text-xs">PT</span></p>
                </div>
                <div class="bg-emerald-950/40 border border-emerald-500/20 p-3 rounded-xl text-center">
                    <p class="text-[10px] opacity-60 font-bold mb-1">新しく貯まるポイント</p>
                    <p id="calcEarn" class="text-xl font-black text-emerald-400">0 <span class="text-xs">PT</span></p>
                </div>
            </div>

            <div class="pt-2">
                <label class="block text-xs font-bold opacity-60 mb-2 uppercase tracking-wider">3. 今回使用するポイント</label>
                <div class="relative">
                    <input type="number" id="usedPoints" min="0" value="0" class="w-full bg-slate-800 border border-white/20 rounded-xl p-3 text-white focus:outline-none focus:border-emerald-500 text-lg font-bold">
                    <span class="absolute right-4 top-3.5 font-bold opacity-60">PT</span>
                </div>
                <p class="text-[10px] opacity-40 mt-1">※お相手がポイントを使用しない場合は0のままで進めてください</p>
            </div>

            <div class="pt-4">
                <button type="submit" id="submitBtn" class="w-full bg-gradient-to-r from-emerald-500 to-teal-600 text-white py-4 rounded-full text-sm font-black shadow-lg hover:opacity-90 active:scale-[0.98] transition-all">
                    🚀 ポイント取引を確定する
                </button>
            </div>
        </form>
    </div>

    <script>
        // 菅田様の動いている最新のGAS本番URLを完全直結しています
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzP8_WdVfsMHLRFq0fxgAtm0EwZQWnuSV_ThGxfeWcqKlNtEYp6I_EiHDKXjJUqJqPJVw/exec";
        const LIFF_ID = "2007046922-EHW4nk35"; // ポイント画面専用のLIFF ID

        let myProfile = null;
        let staffUser = null;

        async function init() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) { liff.login(); return; }
                myProfile = await liff.getProfile();
                
                // GASから自分の情報とメンバー一覧を同時に取得
                const response = await fetch(`${GAS_URL}?userId=${encodeURIComponent(myProfile.userId)}`);
                const data = await response.json();
                
                staffUser = data.user;
                document.getElementById('myStaffName').innerText = `${staffUser.realName} 様 (${staffUser.company || '加盟店'})`;

                // セレクトボックスにメンバー（D列・E列・F列）を全員自動追加
                const select = document.getElementById('customerSelect');
                if (data.members && data.members.length > 0) {
                    data.members.forEach(m => {
                        // 自分自身は選択肢から除外する（誤操作防止）
                        if (m.userId !== myProfile.userId && m.名前 !== "ゲスト") {
                            const opt = document.createElement('option');
                            opt.value = m.名前;
                            opt.innerText = `${m.名前} 様 [${m.会社名}] (${m.会員番号 || '番号未発行'})`;
                            select.appendChild(opt);
                        }
                    });
                }

                document.getElementById('loading').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
            } catch(e) {
                console.error(e);
                alert("システムの初期化に失敗しました。時間をおいて再度お試しください。");
            }
        }

        // 金額入力時に3%付与分をリアルタイム自動計算する関数
        function calculatePoints() {
            const amt = Number(document.getElementById('totalSales').value) || 0;
            // 3%計算（上限5000PT制限ルール適用）
            let earn = Math.floor(amt * 0.03);
            if (earn > 5000) earn = 5000;
            
            document.getElementById('calcEarn').innerText = `${earn.toLocaleString()} PT`;
        }

        // 確定ボタンを押したときの処理（スプレッドシートへの一発書き込み送信）
        async function submitTx(e) {
            e.preventDefault();
            
            const customerName = document.getElementById('customerSelect').value;
            const totalSales = Number(document.getElementById('totalSales').value) || 0;
            const usedPoints = Number(document.getElementById('usedPoints').value) || 0;
            
            let earnedPoints = Math.floor(totalSales * 0.03);
            if (earnedPoints > 5000) earnedPoints = 5000;

            if (!customerName) { alert("お相手を選択してください。"); return; }
            
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = "処理中... 画面を閉じないでください";

            try {
                const payload = {
                    totalSales: totalSales,
                    usedPoints: usedPoints,
                    earnedPoints: earnedPoints,
                    staffId: myProfile.userId,
                    staffName: staffUser.realName,
                    customerName: customerName
                };

                const res = await fetch(GAS_URL, {
                    method: "POST",
                    body: JSON.stringify(payload)
                });
                
                alert(`ポイント取引が正常に完了しました！\n\n【内容】\nお相手: ${customerName} 様\n付与ポイント: +${earnedPoints} PT\n利用ポイント: -${usedPoints} PT`);
                liff.closeWindow(); // 取引完了後にLINEの画面を自動でパッと閉じます
            } catch(err) {
                console.error(err);
                alert("通信エラーが発生しました。スプレッドシートの書き込み状況を確認してください。");
                btn.disabled = false;
                btn.innerText = "🚀 ポイント取引を確定する";
            }
        }

        window.onload = init;
    </script>
</body>
</html>
