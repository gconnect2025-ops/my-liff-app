<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G-CONNECT 会員証</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body { background-color: #f4f6f9; font-family: 'Helvetica Neue', Arial, sans-serif; padding-bottom: 30px; }
        .card-container { max-width: 450px; margin: 20px auto; padding: 0 15px; }
        .member-card { background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); color: white; border-radius: 15px; padding: 25px; box-shadow: 0 10px 20px rgba(0,0,0,0.15); position: relative; overflow: hidden; margin-bottom: 25px; }
        .member-card::before { content: ""; position: absolute; top: -50%; right: -20%; width: 300px; height: 300px; background: rgba(255,255,255,0.03); border-radius: 50%; }
        .card-brand { font-size: 1.4rem; font-weight: bold; letter-spacing: 1px; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 10px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .card-rank { font-size: 0.8rem; background: rgba(255,255,255,0.2); padding: 3px 10px; border-radius: 20px; font-weight: normal; }
        .info-label { font-size: 0.75rem; color: rgba(255,255,255,0.7); margin-bottom: 2px; text-transform: uppercase; }
        .info-value { font-size: 1.1rem; font-weight: 500; margin-bottom: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .point-display { background: rgba(255,255,255,0.1); border-radius: 10px; padding: 15px; margin-top: 15px; text-align: center; backdrop-filter: blur(5px); }
        .point-display .info-label { color: rgba(255,255,255,0.8); font-size: 0.85rem; }
        .point-amount { font-size: 2.2rem; font-weight: bold; color: #fff; margin-top: 5px; line-height: 1; }
        .point-unit { font-size: 1.1rem; margin-left: 5px; font-weight: normal; }
        .qr-section { background: white; border-radius: 15px; padding: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); text-align: center; margin-bottom: 25px; }
        .qr-holder { background: #f8f9fa; padding: 15px; border-radius: 10px; display: inline-block; margin-bottom: 15px; border: 1px solid #e9ecef; }
        .qr-holder img { display: block; max-width: 100%; height: auto; }
        .history-section { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .history-title { font-size: 1rem; font-weight: bold; color: #333; margin-bottom: 15px; padding-bottom: 8px; border-bottom: 2px solid #f4f6f9; display: flex; align-items: center; }
        .history-title i { margin-right: 8px; color: #1e3c72; }
        .history-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f8f9fa; font-size: 0.9rem; }
        .history-item:last-child { border-bottom: none; }
        .hist-info { display: flex; flex-direction: column; max-width: 70%; }
        .hist-date { font-size: 0.75rem; color: #999; margin-bottom: 2px; }
        .hist-staff { color: #444; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .hist-amount { font-weight: bold; font-size: 1rem; text-align: right; }
        .text-plus { color: #2b7de9; }
        .text-minus { color: #eb4d4b; }
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: flex; justify-content: center; align-items: center; z-index: 9999; transition: opacity 0.3s ease; }
        .unregistered-message { text-align: center; color: #666; padding: 30px 10px; }
    </style>
</head>
<body>
    <div id="loading" class="loading-overlay">
        <div class="spinner-border text-primary" role="status"><span class="visually-hidden">Loading...</span></div>
    </div>

    <div class="card-container d-none" id="content">
        <div class="member-card">
            <div class="card-brand"><span>G-CONNECT</span><span class="card-rank" id="userRank">--</span></div>
            <div class="row">
                <div class="col-7">
                    <div class="info-label">Company</div><div class="info-value" id="userCompany">--</div>
                    <div class="info-label">Name</div><div class="info-value" id="userName">--</div>
                </div>
                <div class="col-5 border-start border-white border-opacity-10 ps-3">
                    <div class="info-label">Category</div><div class="info-value" id="userCategory" style="font-size: 0.95rem;">--</div>
                    <div class="info-label">Expiration</div><div class="info-value" id="userExp">--</div>
                </div>
            </div>
            <div class="point-display">
                <div class="info-label"><i class="bi bi-coin me-1"></i>応援ポイント残高</div>
                <div class="point-amount" id="userPoints">0<span class="point-unit">PT</span></div>
            </div>
        </div>

        <div class="mb-4">
            <a href="https://gconnect2025-ops.github.io/my-liff-app/pay.html" class="btn btn-dark w-full py-3 rounded-pill shadow font-weight-bold d-block text-center text-white text-decoration-none" style="background-color: #001524; font-size: 1rem;">
                💸 ポイントを付与する
            </a>
        </div>

        <div class="qr-section" id="qrSection">
            <h5 class="mb-3" style="font-size: 1rem; font-weight: bold; color: #444;">お店での決済時に提示</h5>
            <div class="qr-holder"><img id="qrCode" src="" alt="QRコード" width="160" height="160"></div>
            <p class="text-muted small mb-0" id="memberNoDisplay">会員番号: --</p>
        </div>

        <div class="history-section" id="historySection">
            <div class="history-title"><i class="bi bi-clock-history"></i>ポイントお取引履歴 (直近10件)</div>
            <div id="historyList"></div>
        </div>

        <div class="unregistered-message d-none" id="unregisteredBox">
            <i class="bi bi-exclamation-circle text-warning display-4 mb-3 d-block"></i>
            <h5>会員情報が見つかりません</h5>
            <p class="text-muted small mt-2">LINE公式アカウントで「登録」と送信し、初期登録を完了させてください。</p>
        </div>
    </div>

    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script>
        const GAS_URL_CARD = "https://script.google.com/macros/s/AKfycbzP8_WdVfsMHLRFq0fxgAtm0EwZQWnuSV_ThGxfeWcqKlNtEYp6I_EiHDKXjJUqJqPJVw/exec"; 

        async function init() {
            try {
                await liff.init({ liffId: "2007046922-d6brbL9k" }); 
                if (!liff.isLoggedIn()) { liff.login(); return; }
                const profile = await liff.getProfile();
                const userId = profile.userId;

                const res = await fetch(`${GAS_URL_CARD}?userId=${encodeURIComponent(userId)}`);
                const data = await res.json();
                const user = data.user;

                document.getElementById('loading').classList.add('d-none');
                document.getElementById('content').classList.remove('d-none');

                if (!user || !user.isRegistered) {
                    document.querySelector('.member-card').classList.add('d-none');
                    document.getElementById('qrSection').classList.add('d-none');
                    document.getElementById('historySection').classList.add('d-none');
                    document.getElementById('unregisteredBox').classList.remove('d-none');
                    return;
                }

                document.getElementById('userRank').innerText = user.rank || "レギュラー";
                document.getElementById('userCompany').innerText = user.company || "G-CONNECT";
                document.getElementById('userName').innerText = user.realName + " 様";
                document.getElementById('userCategory').innerText = user.category || "未設定";
                document.getElementById('userExp').innerText = user.exp || "--/--";
                
                const currentPoints = Number(user.points) || 0;
                document.getElementById('userPoints').innerHTML = `${currentPoints.toLocaleString()}<span class="point-unit">PT</span>`;
                document.getElementById('memberNoDisplay').innerText = `会員番号: ${user.memberNo || "未発行"}`;

                if (user.qrUrl && user.qrUrl.includes("http")) {
                    document.getElementById('qrCode').src = user.qrUrl;
                } else {
                    const cleanMemberNo = user.memberNo || user.userId;
                    document.getElementById('qrCode').src = `https://api.qrserver.com/v1/create-qr-code/?size=160x160&data=${encodeURIComponent(cleanMemberNo)}`;
                }

                const listContainer = document.getElementById('historyList');
                listContainer.innerHTML = ''; 

                if (user.historyList && user.historyList.length > 0) {
                    user.historyList.forEach(item => {
                        const div = document.createElement('div');
                        div.className = 'history-item';
                        const sign = item.type === 'plus' ? '+' : '-';
                        const colorClass = item.type === 'plus' ? 'text-plus' : 'text-minus';
                        const displayPoint = Number(item.point) || 0;
                        
                        div.innerHTML = `
                            <div class="hist-info">
                                <span class="hist-date">${item.date}</span>
                                <span class="hist-staff">${item.staff}</span>
                            </div>
                            <div class="hist-amount ${colorClass}">${sign}${displayPoint.toLocaleString()} PT</div>`;
                        listContainer.appendChild(div);
                    });
                } else {
                    listContainer.innerHTML = '<p class="text-muted text-center small py-3 mb-0">お取引履歴はありません</p>';
                }
            } catch (e) {
                console.error(e);
                alert("データの取得に失敗しました。");
            }
        }
        window.onload = init;
    </script>
</body>
</html>
