<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G-CONNECT 会員証 読み込み中...</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script>
        // ★★★ ここをあなたの「新しいデプロイ」URLに書き換えてください ★★★
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyJWRiFDZKmRmpxyw173Sy9zIHN1Y3RSi6ffz64YJKFyM8P_lsTRCPmAM_S8scEWAbXJQ/exec";
        
        // LIFF初期化
        async function initializeLiff() {
            try {
                await liff.init({
                    liffId: "2007046922-d6brbL9k" // 設定済みのLIFF ID
                });

                if (!liff.isLoggedIn()) {
                    liff.login(); // ログインしていなければログイン
                } else {
                    const profile = await liff.getProfile();
                    const userId = profile.userId;
                    
                    // GASへリダイレクト（userIdをパラメータとして渡す）
                    const targetUrl = `${GAS_URL}?action=get&userId=${userId}`;
                    window.location.href = targetUrl;
                }
            } catch (error) {
                console.error("LIFFの初期化に失敗しました", error);
                document.body.innerHTML = `<p style="color:white; text-align:center; margin-top:50px;">
                    読み込みエラーが発生しました。一度閉じて再度お試しください。<br>
                    Error: ${error.message}</p>`;
            }
        }

        window.onload = initializeLiff;
    </script>
    <style>
        body {
            background-color: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
            color: #10b981;
        }
        .loader {
            border: 4px solid #1e293b;
            border-top: 4px solid #10b981;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div style="text-align: center;">
        <div class="loader" style="margin: 0 auto 20px;"></div>
        <p>会員証を表示しています...</p>
    </div>
</body>
</html>
