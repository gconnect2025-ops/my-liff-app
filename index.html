<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G-CONNECT 会員証</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white font-sans min-h-screen p-4 flex flex-col items-center">
    <div id="loading" class="mt-20 text-center">
        <div class="animate-spin h-10 w-10 border-4 border-emerald-500 border-t-transparent rounded-full mx-auto mb-4"></div>
        <p id="status-text" class="text-emerald-500 font-bold">認証中...</p>
    </div>
    <script>
        // ここを最新の情報に固定しました
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxhKOKGzQRvEr0eA5WgudSSsGMPGmL2e0jmO8vUPyzbHShCxNv1JBR_nGee1C-OnDIF7Q/exec";
        const MY_LIFF_ID = "2007046922-d6brbL9k";

        async function main() {
            try {
                await liff.init({ liffId: MY_LIFF_ID });
                if (!liff.isLoggedIn()) {
                    liff.login();
                    return;
                }
                const profile = await liff.getProfile();
                // 認証ができたらスプレッドシートへ飛ばす
                window.location.href = `${GAS_URL}?action=get&userId=${profile.userId}`;
            } catch (e) {
                console.error(e);
                document.getElementById('status-text').innerText = "エラーが発生しました";
            }
        }
        main();
    </script>
</body>
</html>
