<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G-CONNECT 読み込み中...</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script>
        const GAS_URLS = {
            "2007046922-d6brbL9k": "https://script.google.com/macros/s/AKfycbxynJn3a7vOSvAo07Ctuz7SBEmYc3oJulCFslF9TeUiY8OFAB0KxAbkqD4J5ixO_IKw0Q/exec", // 会員証
            "2007046922-EHW4nk35": "https://script.google.com/macros/s/AKfycbymcA2iZopXIZZ_2odSt-VEQiT2wrj8f5rOUu2daei80Bmry3PQoD-cXMKKCLzkSUOJVA/exec"  // 送金
        };

        async function initializeLiff() {
            try {
                // URLのパラメータから 'id' を確実に取得する
                const urlParams = new URLSearchParams(window.location.search);
                let liffId = urlParams.get('id');

                // 万が一パラメータが取得できなかった場合の保険
                if (!liffId) {
                    const state = urlParams.get('liff.state');
                    if (state && state.includes('EHW4nk35')) {
                        liffId = "2007046922-EHW4nk35";
                    } else {
                        liffId = "2007046922-d6brbL9k"; // デフォルト
                    }
                }

                // 取得した正しいIDで初期化
                await liff.init({ liffId: liffId });

                if (!liff.isLoggedIn()) {
                    liff.login();
                } else {
                    const profile = await liff.getProfile();
                    const userId = profile.userId;
                    
                    // IDに対応するGASのURLへリダイレクト
                    const gasUrl = GAS_URLS[liffId] || GAS_URLS["2007046922-d6brbL9k"];
                    const targetUrl = `${gasUrl}?userId=${userId}`;
                    window.location.replace(targetUrl); // hrefより戻るボタン対策に有効なreplaceを使用
                }
            } catch (error) {
                console.error("LIFF初期化失敗", error);
                document.body.innerHTML = `<p style="color:white; text-align:center; padding:20px;">
                    読み込みエラーが発生しました。<br>LINEの設定をご確認ください。<br><span style="font-size:10px;">Error: ${error.message}</span></p>`;
            }
        }

        window.onload = initializeLiff;
    </script>
    <style>
        body { background-color: #0f172a; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; color: #10b981; }
        .loader { border: 4px solid #1e293b; border-top: 4px solid #10b981; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div style="text-align: center;">
        <div class="loader" style="margin: 0 auto 20px;"></div>
        <p>読み込み中...</p>
    </div>
</body>
</html>
